<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HELENA Core - Validação de Pedido JDP</title>
    
    <!-- SDKs de Engenharia -->
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Inter:wght@300;400;700&display=swap" rel="stylesheet">

    <style>
        :root {
            --cyan: #06b6d4;
            --gold: #fde047;
            --slate-950: #020617;
        }

        body {
            background-color: var(--slate-950);
            color: white;
            font-family: 'Inter', sans-serif;
            overflow: hidden;
            height: 100vh;
        }

        .terminal-text {
            font-family: 'Orbitron', sans-serif;
            text-shadow: 0 0 10px var(--cyan);
        }

        .main-engine {
            background: radial-gradient(circle at center, rgba(6, 182, 212, 0.1) 0%, transparent 70%),
                        url('https://raw.githubusercontent.com/pradodalapa-hue/fotos-industrial/main/img/jdp_1779792501564_1778967155044.png');
            background-size: cover;
            background-position: center;
            height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }

        /* Roleta Visual */
        .wheel-container {
            position: relative;
            width: 330px;
            height: 330px;
            border: 6px solid #1e293b;
            border-radius: 50%;
            box-shadow: 0 0 40px rgba(6, 182, 212, 0.2);
        }

        .wheel-spinner {
            width: 100%;
            height: 100%;
            border-radius: 50%;
            background-image: url('https://raw.githubusercontent.com/pradodalapa-hue/fotos-industrial/main/img/jdp_1779787837676_1001186385.png');
            background-size: cover;
            transition: transform 4s cubic-bezier(0.15, 0, 0.15, 1);
        }

        .pointer {
            position: absolute;
            top: -15px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 20;
            filter: drop-shadow(0 0 5px var(--cyan));
        }

        .center-button {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 75px;
            height: 75px;
            background: var(--slate-950);
            border: 3px solid var(--gold);
            border-radius: 50%;
            z-index: 30;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            color: var(--gold);
            transition: all 0.3s;
        }

        .center-button:disabled {
            opacity: 0.3;
            cursor: not-allowed;
            border-color: #475569;
            color: #475569;
        }

        /* Status Scanner */
        .scanner-bar {
            width: 250px;
            height: 4px;
            background: var(--cyan);
            box-shadow: 0 0 15px var(--cyan);
            margin-top: 10px;
            border-radius: 2px;
            animation: pulse 1.5s infinite;
        }

        @keyframes pulse {
            0%, 100% { opacity: 0.3; }
            50% { opacity: 1; }
        }

        #modal-result {
            display: none;
            backdrop-filter: blur(15px);
            background: rgba(2, 6, 23, 0.9);
        }
    </style>
</head>
<body>

    <div class="main-engine">
        <!-- Cabeçalho de Identidade -->
        <div class="absolute top-8 text-center w-full px-4">
            <img src="https://raw.githubusercontent.com/pradodalapa-hue/fotos-industrial/main/img/jdp_1779789267039_1001186393.png" class="w-32 mx-auto mb-3">
            <h1 class="terminal-text text-cyan-400 text-xs tracking-[0.3em] uppercase">Helena Security - Validador JDP</h1>
            <div id="status-box" class="mt-4 inline-block px-4 py-2 border border-slate-700 bg-slate-900/50 rounded text-[10px] uppercase tracking-widest">
                <span id="status-icon" class="inline-block w-2 h-2 rounded-full bg-yellow-500 mr-2"></span>
                <span id="status-display">Iniciando Varredura...</span>
            </div>
            <div id="scanner" class="scanner-bar mx-auto"></div>
        </div>

        <!-- Roleta -->
        <div class="wheel-container">
            <img src="https://raw.githubusercontent.com/pradodalapa-hue/fotos-industrial/main/img/jdp_1779789433798_Engenheiro_Transparente__6_.png" class="pointer w-14">
            <div id="roleta" class="wheel-spinner"></div>
            <button id="btn-girar" onclick="iniciarSorteio()" class="center-button terminal-text text-[10px]" disabled>GIRAR</button>
        </div>

        <!-- Footer -->
        <div class="absolute bottom-6 text-[9px] text-slate-500 terminal-text tracking-widest">
            ID ATUAL: <span id="id-display" class="text-cyan-700">NENHUM</span>
        </div>
    </div>

    <!-- Modal de Resultado -->
    <div id="modal-result" class="fixed inset-0 z-50 flex items-center justify-center p-6">
        <div class="bg-slate-900 border-2 border-cyan-500 rounded-3xl p-8 text-center max-w-xs shadow-[0_0_50px_rgba(6,182,212,0.4)]">
            <h2 class="terminal-text text-gold-400 text-xl mb-4 text-[#fde047]">SISTEMA JDP: GANHOU!</h2>
            <img id="img-premio" src="" class="w-44 h-44 mx-auto mb-4 rounded-xl border border-cyan-900">
            <p id="prize-name" class="text-cyan-400 font-bold text-lg mb-6 uppercase tracking-tighter">---</p>
            <button onclick="confirmarResgate()" class="w-full bg-cyan-600 text-slate-950 font-black py-3 rounded-lg terminal-text text-sm hover:bg-cyan-400 transition-all">
                RESGATAR PRÊMIO
            </button>
        </div>
    </div>

    <script>
        // Configuração de Engenharia JDP
        const firebaseConfig = {
            apiKey: "AIzaSyCEdXF7ScnMYz0Ce0OW-B_UJ8Bm5Pl9m8o",
            databaseURL: "https://dony-burguers-default-rtdb.firebaseio.com"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        // Extração do ID da URL
        const urlParams = new URLSearchParams(window.location.search);
        const pedidoID = urlParams.get('pedido');
        
        const btnGirar = document.getElementById('btn-girar');
        const statusDisplay = document.getElementById('status-display');
        const statusIcon = document.getElementById('status-icon');
        const idDisplay = document.getElementById('id-display');

        const premios = [
            { nome: "X-SALADA", img: "https://raw.githubusercontent.com/pradodalapa-hue/fotos-industrial/main/img/jdp_1779843123607_1779137773417.png" },
            { nome: "KIKÃO", img: "https://raw.githubusercontent.com/pradodalapa-hue/fotos-industrial/main/img/jdp_1779843187147_1779137704141.png" },
            { nome: "10% OFF", img: "https://raw.githubusercontent.com/pradodalapa-hue/fotos-industrial/main/img/jdp_1779797977377_1776103725063.png" },
            { nome: "X-TUDO", img: "https://raw.githubusercontent.com/pradodalapa-hue/fotos-industrial/main/img/jdp_1779797977377_1776103725063.png" },
            { nome: "X-BACON", img: "https://raw.githubusercontent.com/pradodalapa-hue/fotos-industrial/main/img/jdp_1779797977377_1776103725063.png" },
            { nome: "PIX", img: "https://raw.githubusercontent.com/pradodalapa-hue/fotos-industrial/main/img/jdp_1779842647931_1001187967.jpg" }
        ];

        let premioSorteado = null;

        // "NASCE SABENDO": Execução imediata ao carregar
        window.onload = () => {
            if(!pedidoID) {
                atualizarStatus("ERRO: ID AUSENTE", "bg-red-600");
                idDisplay.innerText = "NENHUM";
                return;
            }

            idDisplay.innerText = pedidoID;
            validarAcesso();
        };

        function validarAcesso() {
            db.ref('pedidos/' + pedidoID).once('value', snap => {
                const data = snap.val();

                if(!data) {
                    atualizarStatus("ID INVÁLIDO NO DB", "bg-red-600");
                } else if(data.giro_usado === true) {
                    atualizarStatus("PEDIDO JÁ UTILIZADO", "bg-red-600");
                    btnGirar.disabled = true;
                } else {
                    atualizarStatus("ACESSO LIBERADO", "bg-green-500");
                    btnGirar.disabled = false;
                }
            });
        }

        function atualizarStatus(msg, colorClass) {
            statusDisplay.innerText = msg;
            statusIcon.className = `inline-block w-2 h-2 rounded-full mr-2 ${colorClass}`;
            if(colorClass === "bg-red-600") document.getElementById('scanner').style.background = "#dc2626";
        }

        function iniciarSorteio() {
            btnGirar.disabled = true;
            atualizarStatus("SORTEANDO...", "bg-cyan-500");

            // Segurança: Marca como "em uso" no Firebase
            db.ref('pedidos/' + pedidoID).update({ girando: true });

            const index = Math.floor(Math.random() * 6);
            premioSorteado = premios[index];

            const rotacaoFinal = (360 * 10) + (index * 60);
            document.getElementById('roleta').style.transform = `rotate(${rotacaoFinal}deg)`;

            setTimeout(() => {
                document.getElementById('img-premio').src = premioSorteado.img;
                document.getElementById('prize-name').innerText = premioSorteado.nome;
                document.getElementById('modal-result').style.display = 'flex';
            }, 4100);
        }

        function confirmarResgate() {
            // Imutabilidade JDP: Trava definitiva
            db.ref('pedidos/' + pedidoID).update({
                giro_usado: true,
                girando: false,
                premio: premioSorteado.nome,
                timestamp: firebase.database.ServerValue.TIMESTAMP
            }).then(() => {
                alert("Prêmio registrado com sucesso!");
                window.location.reload(); // Recarrega para mostrar o bloqueio
            });
        }
    </script>
</body>
        </html>
