<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HELENA Core - Roleta de Elite JDP</title>
    <!-- Firebase SDK Compat -->
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
    <style>
        :root { --blue-tech: #06b6d4; --gold: #fde047; --slate-dark: #020617; }
        body, html { margin: 0; padding: 0; height: 100%; overflow: hidden; font-family: 'Roboto', sans-serif; background: #000; }
        .container { background-image: url('https://raw.githubusercontent.com/pradodalapa-hue/fotos-industrial/main/img/jdp_1779792501564_1778967155044.png'); background-position: center; background-size: cover; height: 100vh; width: 100vw; display: flex; flex-direction: column; align-items: center; position: relative; }
        .wheel-logo-bonus__logo { width: 150px; margin-top: 20px; z-index: 5; }
        .wheel { position: relative; margin-top: 50px; width: 332px; height: 332px; background-image: url('https://raw.githubusercontent.com/pradodalapa-hue/fotos-industrial/main/img/jdp_1779788027075_Engenheiro_Transparente__4_.png'); background-size: contain; display: flex; justify-content: center; align-items: center; box-shadow: 0 0 50px rgba(241, 255, 51, 0.4); border-radius: 50%; }
        .wheel__spinner { width: 275px; height: 275px; position: relative; transition: transform 4s cubic-bezier(0.15, 0, 0.15, 1); will-change: transform; }
        .wheel__inside { width: 100%; height: 100%; background-image: url('https://raw.githubusercontent.com/pradodalapa-hue/fotos-industrial/main/img/jdp_1779787837676_1001186385.png'); background-size: cover; border-radius: 50%; }
        .wheel__pointer { position: absolute; top: -20px; width: 60px; z-index: 10; }
        .wheel__button { position: absolute; width: 80px; height: 80px; background-color: #000; border: 4px solid var(--gold); border-radius: 50%; cursor: pointer; z-index: 11; display: flex; justify-content: center; align-items: center; color: var(--gold); font-weight: bold; }
        .popup { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.85); display: none; justify-content: center; align-items: center; z-index: 100; backdrop-filter: blur(8px); }
        .popup-content { width: 320px; height: 450px; background-size: contain; background-repeat: no-repeat; background-position: top center; display: flex; flex-direction: column; align-items: center; justify-content: flex-end; padding-top: 120px; padding-bottom: 40px; text-align: center; }
        .popup-success { background-image: url('https://raw.githubusercontent.com/pradodalapa-hue/fotos-industrial/main/img/jdp_1779787455499_Engenheiro_Transparente__1_.png'); }
        .btn-popup { background: linear-gradient(180deg, #ffe600, #ffb800); border: none; padding: 12px 30px; border-radius: 50px; font-weight: bold; color: #000; cursor: pointer; text-transform: uppercase; }
        .img-premio { width: 220px; margin-bottom: auto; margin-top: 10px; border-radius: 15px; box-shadow: 0 0 15px rgba(255, 255, 255, 0.2); z-index: 101; }
    </style>
</head>
<body>
    <div class="container">
        <img src="https://raw.githubusercontent.com/pradodalapa-hue/fotos-industrial/main/img/jdp_1779789267039_1001186393.png" class="wheel-logo-bonus__logo">
        <div class="wheel">
            <img src="https://raw.githubusercontent.com/pradodalapa-hue/fotos-industrial/main/img/jdp_1779789433798_Engenheiro_Transparente__6_.png" class="wheel__pointer">
            <div class="wheel__spinner" id="roleta">
                <div class="wheel__inside"></div>
            </div>
            <button class="wheel__button" id="btn-girar" onclick="girar()">GIRAR</button>
        </div>
    </div>

    <div class="popup" id="modal-sucesso">
        <div class="popup-content popup-success">
            <img id="img-premio-dinamica" src="" class="img-premio">
            <button class="btn-popup" id="btn-resgatar">RESGATAR PRÊMIO</button>
        </div>
    </div>

    <script>
        // CONFIGURAÇÃO DO CRIADOR JOSÉ DIVINO
        const firebaseConfig = { 
            apiKey: "AIzaSyCEdXF7ScnMYz0Ce0OW-B_UJ8Bm5Pl9m8o", 
            databaseURL: "https://dony-burguers-default-rtdb.firebaseio.com" 
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();
        const LOJA_ID = "DONY_BURGER45";
// Captura o ID da URL
const urlParams = new URLSearchParams(window.location.search);
const pedidoID = urlParams.get('pedido'); 

function validarAcessoAoGiro() {
    if (!pedidoID) {
        alert("ID de pedido inválido!");
        return;
    }
    
    // Verifica se o pedido existe e se já girou
    db.ref('pedidos/' + pedidoID).once('value', snap => {
        const pedido = snap.val();
        if (!pedido) {
            alert("Pedido não encontrado no sistema JDP.");
        } else if (pedido.giro_usado === true) {
            alert("Este pedido já foi utilizado para um giro!");
            btnGirar.disabled = true;
        } else {
            console.log("Acesso autorizado para o pedido: " + pedidoID);
        }
    });
}

        // Mapeamento estático dos prêmios (deve seguir a ordem do cardápio no Firebase)
        const premios = [
            { nome: "x salada", premio: "x salada", comemoracao: "https://raw.githubusercontent.com/pradodalapa-hue/fotos-industrial/main/img/jdp_1779843123607_1779137773417.png", imagem: "https://raw.githubusercontent.com/pradodalapa-hue/fotos-industrial/main/img/jdp_1779843123607_1779137773417.png" },
            { nome: "kikao", premio: "kikao", comemoracao: "https://raw.githubusercontent.com/pradodalapa-hue/fotos-industrial/main/img/jdp_1779843187147_1779137704141.png", imagem: "https://raw.githubusercontent.com/pradodalapa-hue/fotos-industrial/main/img/jdp_1779843187147_1779137704141.png" },
            { nome: "10%", premio: "10%", comemoracao: "https://raw.githubusercontent.com/pradodalapa-hue/fotos-industrial/main/img/jdp_1779797977377_1776103725063.png", imagem: "https://raw.githubusercontent.com/pradodalapa-hue/fotos-industrial/main/img/jdp_1779797977377_1776103725063.png" },
            { nome: "xtudo", premio: "xtudo", comemoracao: "https://raw.githubusercontent.com/pradodalapa-hue/fotos-industrial/main/img/jdp_1779797977377_1776103725063.png", imagem: "https://raw.githubusercontent.com/pradodalapa-hue/fotos-industrial/main/img/jdp_1779797977377_1776103725063.png" },
            { nome: "x bacon", premio: "x bacon", comemoracao: "https://raw.githubusercontent.com/pradodalapa-hue/fotos-industrial/main/img/jdp_1779797977377_1776103725063.png", imagem: "https://raw.githubusercontent.com/pradodalapa-hue/fotos-industrial/main/img/jdp_1779797977377_1776103725063.png" },
            { nome: "pix", premio: "pix", comemoracao: "https://raw.githubusercontent.com/pradodalapa-hue/fotos-industrial/main/img/jdp_1779842647931_1001187967.jpg", imagem: "https://raw.githubusercontent.com/pradodalapa-hue/fotos-industrial/main/img/jdp_1779842647931_1001187967.jpg" }
        ];

        let ultimoIndice = 0;
        const roleta = document.getElementById('roleta');
        const btnGirar = document.getElementById('btn-girar');

        function girar() {
            btnGirar.disabled = true;
            const sorteio = Math.floor(Math.random() * 6);

            // MOTOR: Verifica estoque no Firebase antes de girar
            db.ref('lojas/' + LOJA_ID + '/cardapio').once('value', snap => {
                const itens = snap.val();
                if (!itens) return;
                const nomes = Object.keys(itens);
                const itemSorteado = itens[nomes[sorteio]];

                if (itemSorteado.estoque <= 0) {
                    alert("Produto " + premios[sorteio].nome + " esgotado! Tente novamente.");
                    btnGirar.disabled = false;
                } else {
                    ultimoIndice = sorteio;
                    const angulo = (sorteio * 60) + 1800; 
                    roleta.style.transform = `rotate(${angulo}deg)`;

                    setTimeout(() => {
                        if (navigator.vibrate) navigator.vibrate(500);
                        document.getElementById('img-premio-dinamica').src = premios[sorteio].imagem;
                        document.getElementById('modal-sucesso').style.display = 'flex';
                        btnGirar.disabled = false;
                    }, 4000);
                }
            });
        }

        document.getElementById('btn-resgatar').onclick = function() {
            const p = premios[ultimoIndice];

            // MOTOR: Baixa no estoque e redirecionamento
            db.ref('lojas/' + LOJA_ID + '/cardapio').once('value', snap => {
                const nomes = Object.keys(snap.val());
                const idItem = nomes[ultimoIndice];

                // Executa a transação de débito no Firebase
                db.ref('lojas/' + LOJA_ID + '/cardapio/' + idItem + '/estoque')
                  .transaction(c => (c > 0 ? c - 1 : 0))
                  .then(() => {
                      // Após o débito, abre a comemoração e redireciona para o prêmio
                      window.open(p.comemoracao, '_blank');
                      window.location.href = p.premio;
                  });
            });
        };
    </script>
</body>
</html>
