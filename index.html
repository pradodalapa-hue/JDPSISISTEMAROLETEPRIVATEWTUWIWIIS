<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HELENA Core - Roleta Industrial JDP</title>
<script>
    const urlParams = new URLSearchParams(window.location.search);
    const pedido = urlParams.get('pedido');

    // Verifica se o pedido existe e se começa com "JDP-"
    if (!pedido || !pedido.startsWith('JDP-')) {
        document.write(`
            <style>
                body { margin: 0; padding: 0; overflow: hidden; background: #000; }
                .tela-bloqueio { 
                    width: 100vw; 
                    height: 100vh; 
                    display: flex; 
                    align-items: center; 
                    justify-content: center; 
                }
                .tela-bloqueio img { 
                    max-width: 100%; 
                    max-height: 100%; 
                    object-fit: contain; 
                }
            </style>
            <div class="tela-bloqueio">
                <img src="https://www.google.com/" alt="Acesso Negado">
            </div>
        `);
        window.stop();
    }
</script>
    
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Inter:wght@300;400;700&display=swap" rel="stylesheet">

    <style>
        :root { --cyan: #06b6d4; --gold: #fde047; --slate: #020617; }
        body { background: var(--slate); color: white; font-family: 'Inter', sans-serif; overflow: hidden; height: 100vh; }
        .terminal-text { font-family: 'Orbitron', sans-serif; text-shadow: 0 0 10px var(--cyan); }
        
        .main-engine {
            background: radial-gradient(circle at center, rgba(6,182,212,0.1) 0%, transparent 70%),
                        url('https://raw.githubusercontent.com/pradodalapa-hue/fotos-industrial/main/img/jdp_1779792501564_1778967155044.png');
            background-size: cover; background-position: center; height: 100vh;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
        }

        .wheel-container {
            position: relative; width: 340px; height: 340px;
            border: 8px solid #1e293b; border-radius: 50%;
            box-shadow: 0 0 50px rgba(6, 182, 212, 0.3);
        }

        .wheel-spinner {
            width: 100%; height: 100%; border-radius: 50%;
            background-image: url('https://raw.githubusercontent.com/pradodalapa-hue/fotos-industrial/main/img/jdp_1779787837676_1001186385.png');
            background-size: cover; transition: transform 4s cubic-bezier(0.1, 0, 0.1, 1);
        }

        .center-button {
            position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
            width: 80px; height: 80px; background: #000; border: 4px solid var(--gold);
            border-radius: 50%; z-index: 30; cursor: pointer; color: var(--gold); font-weight: bold;
        }

        .center-button:disabled { opacity: 0.3; filter: grayscale(1); cursor: not-allowed; }

        #modal-result {
            display: none; position: fixed; inset: 0; z-index: 50;
            backdrop-filter: blur(15px); background: rgba(2,6,23,0.9);
            align-items: center; justify-content: center;
        }
    </style>
</head>
<body>

    <div class="main-engine">
        <div class="absolute top-10 text-center">
            <img src="https://raw.githubusercontent.com/pradodalapa-hue/fotos-industrial/main/img/jdp_1779789267039_1001186393.png" class="w-32 mx-auto mb-2">
            <h1 class="terminal-text text-cyan-400 text-[10px] tracking-[0.4em]">HELENA CORE v3.5</h1>
            <p id="status-display" class="text-[10px] mt-2 uppercase tracking-widest text-yellow-500">Autenticando...</p>
        </div>

        <div class="wheel-container">
            <img src="https://raw.githubusercontent.com/pradodalapa-hue/fotos-industrial/main/img/jdp_1779789433798_Engenheiro_Transparente__6_.png" class="absolute top-[-20px] left-1/2 -translate-x-1/2 w-16 z-20">
            <div id="roleta" class="wheel-spinner"></div>
            <button id="btn-girar" onclick="iniciarGiro()" class="center-button terminal-text text-[10px]" disabled>GIRAR</button>
        </div>
    </div>

    <div id="modal-result">
        <div class="bg-slate-900 border-2 border-cyan-500 p-8 rounded-3xl text-center max-w-xs">
            <h2 class="terminal-text text-yellow-400 text-xl mb-4">SISTEMA: GANHOU!</h2>
            <img id="img-premio" src="" class="w-40 h-40 mx-auto mb-4 rounded-xl border border-cyan-800">
            <p id="prize-name" class="text-cyan-400 font-bold text-lg mb-6 uppercase">---</p>
            <button onclick="confirmarResgate()" class="w-full bg-cyan-600 py-3 rounded-lg font-bold text-black terminal-text">RESGATAR</button>
        </div>
    </div>

    <script>
        const firebaseConfig = { databaseURL: "https://dony-burguers-default-rtdb.firebaseio.com" };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();
        
        const LOJA_ID = "DONY_BURGER45";
        const urlParams = new URLSearchParams(window.location.search);
        const pedidoID = urlParams.get('pedido');
        
        const btnGirar = document.getElementById('btn-girar');
        const statusDisplay = document.getElementById('status-display');

        const premios = [
            { nome: "X-SALADA", img: "https://raw.githubusercontent.com/pradodalapa-hue/fotos-industrial/main/img/jdp_1779843123607_1779137773417.png" },
            { nome: "KIKÃO", img: "https://raw.githubusercontent.com/pradodalapa-hue/fotos-industrial/main/img/jdp_1779843187147_1779137704141.png" },
            { nome: "10% OFF", img: "https://raw.githubusercontent.com/pradodalapa-hue/fotos-industrial/main/img/jdp_1779797977377_1776103725063.png" },
            { nome: "X-TUDO", img: "https://raw.githubusercontent.com/pradodalapa-hue/fotos-industrial/main/img/jdp_1779797977377_1776103725063.png" },
            { nome: "X-BACON", img: "https://raw.githubusercontent.com/pradodalapa-hue/fotos-industrial/main/img/jdp_1779797977377_1776103725063.png" },
            { nome: "PIX", img: "https://raw.githubusercontent.com/pradodalapa-hue/fotos-industrial/main/img/jdp_1779842647931_1001187967.jpg" }
        ];

        let sorteado = null;

        // INICIALIZAÇÃO "NASCE SABENDO"
        window.onload = () => {
            if(!pedidoID) {
                statusDisplay.innerText = "ERRO: ID AUSENTE";
                return;
            }
            validarSessao();
        };

        function validarSessao() {
            db.ref(`lojas/${LOJA_ID}/rastreio_ativo/${pedidoID}`).once('value', snap => {
                const data = snap.val();
                if(!data) {
                    statusDisplay.innerText = "ID NÃO LOCALIZADO";
                } else if(data.giro_usado) {
                    statusDisplay.innerText = "ACESSO NEGADO: JÁ UTILIZADO";
                } else if(data.giro_autorizado) {
                    statusDisplay.innerText = "SISTEMA LIBERADO";
                    statusDisplay.className = "text-[10px] mt-2 uppercase tracking-widest text-green-500";
                    btnGirar.disabled = false;
                } else {
                    statusDisplay.innerText = "AGUARDANDO PAGAMENTO...";
                }
            });
        }

        function iniciarGiro() {
            btnGirar.disabled = true;
            // Trava imediata no servidor para evitar F5
            db.ref(`lojas/${LOJA_ID}/rastreio_ativo/${pedidoID}`).update({ giro_usado: true });

            const index = Math.floor(Math.random() * 6);
            sorteado = premios[index];

            const rotation = (360 * 10) + (index * 60);
            document.getElementById('roleta').style.transform = `rotate(${rotation}deg)`;

            setTimeout(() => {
                document.getElementById('img-premio').src = sorteado.img;
                document.getElementById('prize-name').innerText = sorteado.nome;
                document.getElementById('modal-result').style.display = 'flex';
            }, 4100);
        }

        function confirmarResgate() {
            db.ref(`lojas/${LOJA_ID}/rastreio_ativo/${pedidoID}`).update({
                premio_ganho: sorteado.nome,
                data_premio: firebase.database.ServerValue.TIMESTAMP
            }).then(() => {
                alert("Prêmio registrado! Mostre esta tela ao atendente.");
                location.reload();
            });
        }
    </script>
</body>
  </html>
